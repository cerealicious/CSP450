<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="200" fill="url(#hero-bg)" rx="12" />

  <!-- Network Topology Graphic -->
  <g stroke="#38BDF8" stroke-width="1.5" opacity="0.4" filter="url(#glow)">
    <!-- Connections -->
    <path d="M 50 100 L 150 40 L 250 100 L 150 160 Z" fill="none" />
    <path d="M 150 40 L 350 100 L 150 160" fill="none" />
    <path d="M 350 100 L 450 40 L 550 100 L 450 160 Z" fill="none" />
    <path d="M 550 100 L 750 100" fill="none" stroke-dasharray="4 4" />
    
    <!-- Nodes -->
    <circle cx="50" cy="100" r="5" fill="#38BDF8" />
    <circle cx="150" cy="40" r="5" fill="#38BDF8" />
    <circle cx="250" cy="100" r="5" fill="#38BDF8" />
    <circle cx="150" cy="160" r="5" fill="#38BDF8" />
    <circle cx="350" cy="100" r="5" fill="#818CF8" />
    <circle cx="450" cy="40" r="5" fill="#818CF8" />
    <circle cx="550" cy="100" r="5" fill="#818CF8" />
    <circle cx="450" cy="160" r="5" fill="#818CF8" />
    <circle cx="750" cy="100" r="5" fill="#F472B6" />
  </g>

  <!-- Text Elements -->
  <text x="425" y="95" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="800" fill="url(#text-grad)" text-anchor="middle" letter-spacing="2">
    CSP450 CAPSTONE PROJECT
  </text>
  <text x="425" y="135" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#94A3B8" text-anchor="middle" letter-spacing="4">
    NETWORK &amp; INFRASTRUCTURE BLUEPRINT
  </text>
</svg>
